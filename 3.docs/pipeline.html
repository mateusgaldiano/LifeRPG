<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeRPG OS — Pipeline de Melhorias v2.0</title>
<style>
  :root {
    --bg: #0b1120;
    --bg-card: #111827;
    --bg-input: #1a2235;
    --border: rgba(99,102,241,.22);
    --neon-purple: #7c3aed;
    --neon-cyan: #22d3ee;
    --neon-gold: #f59e0b;
    --neon-red: #ef4444;
    --neon-green: #22c55e;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
    --font-hud: 'Orbitron', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    /* cluster colors */
    --c-bug: #ef4444;
    --c-game: #f59e0b;
    --c-ux: #a78bfa;
    --c-mobile: #60a5fa;
    --c-sec: #f97316;
    --c-eng: #34d399;
    --c-data: #38bdf8;
    --c-social: #fb7185;
    --c-mkt: #facc15;
    --c-a11y: #c084fc;
    --c-onboard: #4ade80;
    --c-meta: #7B68EE;
  }

  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  .page-header {
    background: linear-gradient(135deg, #0b1120 0%, #1a0a2e 50%, #0b1120 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 40px rgba(124,58,237,.15);
  }
  .header-top {
    display: flex; align-items: center; gap: 16px; margin-bottom: 18px;
  }
  .logo-icon {
    font-size: 1.8rem;
    filter: drop-shadow(0 0 14px #7c3aed);
  }
  .header-title { font-family: var(--font-hud); }
  .header-title h1 {
    font-size: 18px; letter-spacing: 3px; color: var(--neon-cyan);
    text-shadow: 0 0 20px rgba(34,211,238,.4);
  }
  .header-title p {
    font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; margin-top: 2px;
  }
  .header-stats {
    margin-left: auto; display: flex; gap: 20px;
  }
  .stat-pill {
    background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.3);
    border-radius: 20px; padding: 4px 14px;
    font-family: var(--font-hud); font-size: 10px; letter-spacing: 1px;
    color: var(--neon-purple);
  }
  .stat-pill span { color: var(--text-primary); font-size: 13px; font-weight: 700; margin-right: 4px; }

  /* CONTROLS */
  .controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .search-box {
    background: var(--bg-input); border: 1px solid var(--border);
    color: var(--text-primary); padding: 7px 14px; border-radius: 6px;
    font-family: var(--font-body); font-size: 12px; width: 240px; outline: none;
    transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--neon-purple); }
  .search-box::placeholder { color: var(--text-muted); }

  .filter-label {
    font-size: 10px; color: var(--text-muted); letter-spacing: 1px;
    font-family: var(--font-hud); align-self: center;
  }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .filter-btn {
    border: 1px solid var(--border); background: transparent;
    color: var(--text-secondary); cursor: pointer;
    border-radius: 4px; padding: 4px 10px; font-size: 11px;
    font-family: var(--font-body); transition: all .15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--neon-purple); color: var(--neon-purple); }
  .filter-btn.active { background: var(--neon-purple); border-color: var(--neon-purple); color: #fff; }

  .sort-btn {
    background: var(--bg-input); border: 1px solid var(--border);
    color: var(--text-secondary); cursor: pointer; border-radius: 4px;
    padding: 4px 10px; font-size: 11px; font-family: var(--font-body);
    transition: all .15s;
  }
  .sort-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }

  /* CLUSTER LEGEND */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 12px 32px; border-bottom: 1px solid rgba(255,255,255,.04);
    background: rgba(0,0,0,.2);
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--text-muted); letter-spacing: .5px;
    cursor: pointer; padding: 3px 8px; border-radius: 4px;
    transition: background .15s;
  }
  .legend-item:hover { background: rgba(255,255,255,.04); color: var(--text-secondary); }
  .legend-item.active { color: var(--text-primary); background: rgba(255,255,255,.06); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* TABLE */
  .table-wrap {
    padding: 0 32px 40px;
    overflow-x: auto;
  }

  table {
    width: 100%; border-collapse: collapse; margin-top: 20px;
    font-size: 12px;
  }
  thead th {
    font-family: var(--font-hud); font-size: 9px; letter-spacing: 1.5px;
    color: var(--text-muted); text-align: left; padding: 10px 12px;
    border-bottom: 1px solid var(--border); white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--neon-cyan); }
  thead th.sorted-asc::after { content: ' ↑'; color: var(--neon-cyan); }
  thead th.sorted-desc::after { content: ' ↓'; color: var(--neon-cyan); }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,.03);
    transition: background .1s;
  }
  tbody tr:hover { background: rgba(124,58,237,.05); }
  tbody tr.hidden { display: none; }
  tbody tr.done { opacity: .4; }

  td { padding: 9px 12px; vertical-align: middle; }

  .td-id {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
    white-space: nowrap;
  }

  .cluster-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; letter-spacing: .5px;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  }

  .persona-tag {
    font-size: 10px; color: var(--text-muted); font-style: italic;
    white-space: nowrap;
  }

  .td-item {
    max-width: 340px; line-height: 1.45;
    color: var(--text-primary);
  }
  .td-item .item-title { font-weight: 600; margin-bottom: 2px; }
  .td-item .item-desc {
    font-size: 11px; color: var(--text-muted); line-height: 1.4;
  }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 3px;
    font-size: 10px; font-weight: 700; letter-spacing: .5px;
    font-family: var(--font-hud); white-space: nowrap;
  }

  /* Impacto */
  .imp-p0 { background: rgba(239,68,68,.15); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
  .imp-p1 { background: rgba(245,158,11,.12); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
  .imp-p2 { background: rgba(124,58,237,.12); color: #a78bfa; border: 1px solid rgba(124,58,237,.3); }
  .imp-p3 { background: rgba(71,85,105,.15); color: #64748b; border: 1px solid rgba(71,85,105,.3); }

  /* Esforço */
  .ef-xs { background: rgba(34,197,94,.1); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
  .ef-s  { background: rgba(34,211,238,.1); color: #67e8f9; border: 1px solid rgba(34,211,238,.2); }
  .ef-m  { background: rgba(245,158,11,.1); color: #fbbf24; border: 1px solid rgba(245,158,11,.2); }
  .ef-l  { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
  .ef-xl { background: rgba(124,58,237,.12); color: #a78bfa; border: 1px solid rgba(124,58,237,.3); }

  /* Tipo */
  .tipo-bug   { color: #ef4444; }
  .tipo-feat  { color: #22d3ee; }
  .tipo-enh   { color: #a78bfa; }
  .tipo-tech  { color: #34d399; }
  .tipo-sec   { color: #f97316; }
  .tipo-data  { color: #38bdf8; }
  .tipo-cont  { color: #facc15; }

  /* Fase */
  .fase-now   { color: #ef4444; font-weight: 700; }
  .fase-near  { color: #f59e0b; }
  .fase-fut   { color: #64748b; }

  .td-notas {
    font-size: 11px; color: var(--text-muted); max-width: 240px;
    line-height: 1.4;
  }
  .td-notas code {
    background: rgba(124,58,237,.15); color: #c4b5fd;
    padding: 1px 5px; border-radius: 3px;
    font-family: var(--font-mono); font-size: 10px;
  }

  /* Done toggle */
  .done-toggle {
    width: 16px; height: 16px; border-radius: 3px;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .done-toggle:hover { border-color: var(--neon-green); background: rgba(34,197,94,.1); }
  .done-toggle.checked { background: var(--neon-green); border-color: var(--neon-green); }
  .done-toggle.checked::after { content: '✓'; color: #000; font-size: 10px; font-weight: 900; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 60px 32px;
    color: var(--text-muted); font-family: var(--font-hud);
    font-size: 11px; letter-spacing: 2px; display: none;
  }
  .empty-state.show { display: block; }

  /* Counter */
  #visible-count {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-muted); margin-left: auto; align-self: center;
  }

  .controls-row2 {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 10px;
  }

  .reset-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer; padding: 4px 10px;
    border-radius: 4px; font-size: 11px; transition: all .15s;
  }
  .reset-btn:hover { border-color: var(--neon-red); color: var(--neon-red); }

  @media(max-width: 900px) {
    .page-header { padding: 16px; }
    .table-wrap { padding: 0 12px 40px; }
    .legend { padding: 10px 12px; }
    .header-stats { display: none; }
    .td-notas { display: none; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-top">
    <div class="logo-icon">⚡</div>
    <div class="header-title">

      <button class="filter-btn" data-filter="esforco" data-val="L">L</button>

    <button class="reset-btn" id="reset-done">↺ MOSTRAR CONCLUÍDOS</button>
    <button class="reset-btn" id="reset-filters">✕ LIMPAR FILTROS</button>
    <span id="visible-count">— itens</span>
  </div>
</div>

<div class="legend" id="cluster-legend"></div>

<div class="table-wrap">
  <div class="empty-state" id="empty-state">[ NENHUM ITEM ENCONTRADO ]</div>
  <table id="pipeline-table">
    <thead>
      <tr>
        <th></th>
        <th data-sort="id">ID</th>
        <th data-sort="cluster">CLUSTER</th>
        <th data-sort="persona">PERSONA</th>
        <th>ITEM</th>
        <th data-sort="prioridade">PRIO</th>
        <th data-sort="esforco">ESFORÇO</th>

        <th data-sort="fase">FASE</th>
        <th>NOTAS / REFERÊNCIA</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>

  'Onboarding':     { color: '#4ade80', emoji: '🧭' },

};

const TIPO_CLASSES = {
  'Bug': 'tipo-bug', 'Feature': 'tipo-feat', 'Enhancement': 'tipo-enh',
  'Tech Debt': 'tipo-tech', 'Segurança': 'tipo-sec', 'Analytics': 'tipo-data', 'Conteúdo': 'tipo-cont'
};

const PRIO_CLASSES = { 'P0': 'imp-p0', 'P1': 'imp-p1', 'P2': 'imp-p2', 'P3': 'imp-p3' };
const EF_CLASSES   = { 'XS': 'ef-xs', 'S': 'ef-s', 'M': 'ef-m', 'L': 'ef-l', 'XL': 'ef-xl' };
const FASE_CLASSES = { 'Agora': 'fase-now', 'Próximas semanas': 'fase-near', 'Futuro': 'fase-fut' };

const items = [
  {"id":"PWA-001","cluster":"Mobile & PWA","persona":"Engenheiro PWA","titulo":"iOS Safari: virtual keyboard empurra chat UI","desc":"---","prio":"P1","esforco":"M","tipo":"Bug","fase":"Próximas semanas","notas":"Ver <code>1.core/modules/social.js, 1.core/styles.css</code>.\n1. Abrir styles.css e localizar .modal-box-social ou o container do chat global\n2. Substituir height: 90dvh por height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom))\n3. No input do chat (.chat-input-row), adicionar padding-bottom: env(safe-area-inset-bottom)\n4. Em social.js, adicionar listener para visualViewport resize:\n   if (window.visualViewport) {\n     window.visualViewport.addEventListener('resize', () => {\n       const chatBox = document.querySelector('.social-modal-body');\n       if (chatBox) chatBox.style.height = window.visualViewport.height * 0.75 + 'px';\n     });\n   }\n5. Testar no iPhone via BrowserStack ou dispositivo real: abrir chat, focar no input, confirmar que campo de input não é coberto pelo teclado\n6. Commit: \"fix: ajustar height do chat modal para visualViewport no iOS Safari\""},
  {"id":"UX-002","cluster":"UX/Visual","persona":"Designer UX","titulo":"3 colunas de quest muito estreitas em mobile","desc":"---","prio":"P1","esforco":"M","tipo":"Enhancement","fase":"Próximas semanas","notas":"Ver <code>1.core/styles.css</code>.\n1. Abrir styles.css e localizar .quests-three-columns\n2. Modificar para ser responsivo:\n   @media (max-width: 640px) {\n     .quests-three-columns {\n       grid-template-columns: 1fr;\n     }\n     .quest-attr-column {\n       display: none;\n     }\n     .quest-attr-column.active-mobile {\n       display: block;\n     }\n   }\n3. Em index.html, adicionar tabs de seleção de coluna para mobile (Vontade / Intelecto / Vitalidade) que aparecem apenas em mobile (display none em desktop)\n4. Em ui.js, adicionar listener nos tabs mobile para alternar qual .quest-attr-column tem a classe active-mobile\n5. Primeira coluna ativa por padrão no load mobile\n6. Commit: \"feat: layout responsivo de quests em mobile (1 coluna com tabs)\""},
  {"id":"UX-004","cluster":"UX/Visual","persona":"Designer UX","titulo":"Level Up overlay não mostra o que desbloqueou","desc":"---","prio":"P1","esforco":"M","tipo":"Enhancement","fase":"Próximas semanas","notas":"Ver <code>1.core/modules/ui.js, index.html</code>.\n1. Em ui.js, localizar a função triggerLevelUpOverlay\n2. Após calcular o novo nível, buscar em ALL_HABITS_DATABASE os hábitos com minLevel === novoNivel\n3. Buscar em BOSS_QUEST_BY_LEVEL se o novo nível ativa uma boss quest\n4. Adicionar no overlay HTML (index.html) uma div #levelup-unlocks logo abaixo do .levelup-new-level\n5. Injetar via JS: lista de novos hábitos + boss quest ativada (se houver) + próximo rank (se rank up)\n6. Estilizar: fundo rgba(124,58,237,0.1), border roxa, padding 10px, font-size 12px\n7. Commit: \"feat: overlay de Level Up exibe hábitos desbloqueados e boss quest ativada\""},
  {"id":"SOCIAL-001","cluster":"Social","persona":"Engenheiro Social","titulo":"Friends: busca por prefixo ao invés de username exato","desc":"---","prio":"P1","esforco":"M","tipo":"Feature","fase":"Próximas semanas","notas":"Ver <code>1.core/modules/social.js</code>.\n1. Em social.js, localizar a função de busca de amigos (provavelmente triggerFriendSearch ou similar)\n2. Substituir query de busca exata por ILIKE:\n   .from('persons').select('id, username, level, rank').ilike('username', `%${searchTerm}%`).limit(5)\n3. Exibir resultados como lista de 5 cards com: avatar placeholder, username, nível e botão \"ADICIONAR\"\n4. Commit: \"feat: busca de amigos por prefixo (ILIKE) ao invés de username exato\""},
  {"id":"MKT-002","cluster":"Marketing","persona":"Growth Hacker","titulo":"\"Streak em risco\" push notification às 22h","desc":"---","prio":"P1","esforco":"M","tipo":"Feature","fase":"Próximas semanas","notas":"1. Criar Supabase Edge Function `send-streak-reminder` que:\n   - Busca todos os users com push_subscription ativo que NÃO completaram nenhuma daily hoje\n   - Envia push notification com payload: { title: '⚠️ LifeRPG — Streak em Risco', body: 'Seu streak de X dias não sobrevive à meia-noite sem uma missão.' }\n2. No pg_cron, agendar: SELECT cron.schedule('streak-reminder', '0 22 * * *', $SELECT net.http_post(url := current_setting('app.edge_functions_url') || '/send-streak-reminder', headers := '{\"Authorization\": \"Bearer \" || current_setting(\"app.service_role_key\")}')$);\n3. Em pwa.js, garantir que push_subscription do usuário é salvo em uma tabela `push_subscriptions` ao se inscrever\n4. Commit: \"feat: push notification de streak em risco às 22h via Edge Function + pg_cron\""},

// Interactive state
let currentFilters = {
    prioridade: 'all',
    fase: 'all',
    esforco: 'all',
    cluster: 'all',
    search: '',
    showDone: false
};

let currentSort = {
    column: 'prioridade',
    asc: true
};

// LocalStorage checked items helper
function getDoneState(id) {
    return localStorage.getItem('liferpg_pipeline_done_' + id) === 'true';
}

function setDoneState(id, isDone) {
    if (isDone) {
        localStorage.setItem('liferpg_pipeline_done_' + id, 'true');
    } else {
        localStorage.removeItem('liferpg_pipeline_done_' + id);
    }
    updateStats();
    renderTable();
}

function updateStats() {
    const total = items.length;
    const p0 = items.filter(item => item.prio === 'P0').length;
    let done = 0;
    items.forEach(item => {
        if (getDoneState(item.id)) done++;
    });

    document.getElementById('cnt-total').innerText = total;
    document.getElementById('cnt-p0').innerText = p0;
    document.getElementById('cnt-done').innerText = done;
}

// Generate Cluster Legend Filters
function initLegend() {
    const legendEl = document.getElementById('cluster-legend');
    legendEl.innerHTML = '';
    
    // Add "All" option
    const allItem = document.createElement('div');
    allItem.className = 'legend-item active';
    allItem.dataset.cluster = 'all';
    allItem.innerHTML = `<span class="legend-dot" style="background:#888"></span>TODOS`;
    allItem.addEventListener('click', () => filterByCluster('all'));
    legendEl.appendChild(allItem);

    Object.entries(CLUSTERS).forEach(([name, def]) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.dataset.cluster = name;
        item.innerHTML = `<span class="legend-dot" style="background:&quot;"${def.color}"></span>${def.emoji} ${name.toUpperCase()}`;
        item.addEventListener('click', () => filterByCluster(name));
        legendEl.appendChild(item);
    });
}

function filterByCluster(cluster) {
    currentFilters.cluster = cluster;
    document.querySelectorAll('#cluster-legend .legend-item').forEach(el => {
        if (el.dataset.cluster === cluster) {
            el.classList.add('active');
        } else {
            el.classList.remove('active');
        }
    });
    renderTable();
}

// Sorting logic
const prioOrder = { 'P0': 0, 'P1': 1, 'P2': 2, 'P3': 3 };
const effortOrder = { 'XS': 0, 'S': 1, 'M': 2, 'L': 3, 'XL': 4 };
const faseOrder = { 'Agora': 0, 'Próximas semanas': 1, 'Futuro': 2 };

function sortItems(a, b) {
    let valA = a[currentSort.column] || '';
    let valB = b[currentSort.column] || '';

    // Custom order comparisons
    if (currentSort.column === 'prioridade') {
        const orderA = prioOrder[a.prio] !== undefined ? prioOrder[a.prio] : 99;
        const orderB = prioOrder[b.prio] !== undefined ? prioOrder[b.prio] : 99;
        return currentSort.asc ? orderA - orderB : orderB - orderA;
    }
    if (currentSort.column === 'esforco') {
        const orderA = effortOrder[a.esforco] !== undefined ? effortOrder[a.esforco] : 99;
        const orderB = effortOrder[b.esforco] !== undefined ? effortOrder[b.esforco] : 99;
        return currentSort.asc ? orderA - orderB : orderB - orderA;
    }
    if (currentSort.column === 'fase') {
        const orderA = faseOrder[a.fase] !== undefined ? faseOrder[a.fase] : 99;
        const orderB = faseOrder[b.fase] !== undefined ? faseOrder[b.fase] : 99;
        return currentSort.asc ? orderA - orderB : orderB - orderA;
    }

    // String comparison
    if (typeof valA === 'string') {
        return currentSort.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
    }
    return currentSort.asc ? valA - valB : valB - valA;
}

function handleSort(column) {
    if (currentSort.column === column) {
        currentSort.asc = !currentSort.asc;
    } else {
        currentSort.column = column;
        currentSort.asc = true;
    }

    // Update th headers visual sorting indicator
    document.querySelectorAll('thead th').forEach(th => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (th.dataset.sort === column) {
            th.classList.add(currentSort.asc ? 'sorted-asc' : 'sorted-desc');
        }
    });

    renderTable();
}

function initSorting() {
    document.querySelectorAll('thead th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
            handleSort(th.dataset.sort);
        });
    });
}

// Render Table Rows
function renderTable() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    const sorted = [...items].sort(sortItems);
    let visibleCount = 0;

    sorted.forEach(item => {
        const isDone = getDoneState(item.id);
        
        // Apply showDone filter
        if (isDone && !currentFilters.showDone) return;

        // Apply filters
        if (currentFilters.prioridade !== 'all' && item.prio !== currentFilters.prioridade) return;
        if (currentFilters.fase !== 'all' && item.fase !== currentFilters.fase) return;
        if (currentFilters.esforco !== 'all' && item.esforco !== currentFilters.esforco) return;
        if (currentFilters.cluster !== 'all' && item.cluster !== currentFilters.cluster) return;

        // Apply search query
        if (currentFilters.search) {
            const query = currentFilters.search.toLowerCase();
            const match = item.id.toLowerCase().includes(query) ||
                          item.cluster.toLowerCase().includes(query) ||
                          item.persona.toLowerCase().includes(query) ||
                          item.titulo.toLowerCase().includes(query) ||
                          item.desc.toLowerCase().includes(query) ||
                          item.notas.toLowerCase().includes(query);
            if (!match) return;
        }

        visibleCount++;

        const tr = document.createElement('tr');
        if (isDone) tr.className = 'done';

        const clusterDef = CLUSTERS[item.cluster] || { color: '#888', emoji: '⚙️' };
        const tipoClass = TIPO_CLASSES[item.tipo] || '';
        const prioClass = PRIO_CLASSES[item.prio] || '';
        const efClass = EF_CLASSES[item.esforco] || '';
        const faseClass = FASE_CLASSES[item.fase] || '';

        // Formats linebreaks in notes
        const formattedNotes = item.notas.replace(/\n/g, '<br>');

        tr.innerHTML = `
            <td>
                <div class="done-toggle ${isDone ? 'checked' : ''}" onclick="setDoneState('${item.id}', ${!isDone})"></div>
            </td>
            <td class="td-id">${item.id}</td>
            <td>
                <span class="cluster-badge" style="background:${clusterDef.color}15; color:${clusterDef.color}; border: 1px solid ${clusterDef.color}33">
                    ${clusterDef.emoji} ${item.cluster}
                </span>
            </td>
            <td class="persona-tag">${item.persona}</td>
            <td class="td-item">
                <div class="item-title">${item.titulo}</div>
                <div class="item-desc">${item.desc}</div>
            </td>
            <td><span class="badge ${prioClass}">${item.prio}</span></td>
            <td><span class="badge ${efClass}">${item.esforco}</span></td>
            <td class="font-hud ${tipoClass}" style="font-size:10px; font-weight:700">${item.tipo.toUpperCase()}</td>
            <td class="font-hud ${faseClass}" style="font-size:9px; letter-spacing:0.5px">${item.fase.toUpperCase()}</td>
            <td class="td-notas">&quot;${formattedNotes}&quot;</td>
        `;
        tbody.appendChild(tr);
    });

    // Update visible item count
    document.getElementById('visible-count').innerText = `${visibleCount} de ${items.length} itens exibidos`;

    // Show/Hide empty state
    const emptyState = document.getElementById('empty-state');
    if (visibleCount === 0) {
        emptyState.classList.add('show');
        document.getElementById('pipeline-table').style.display = 'none';
    } else {
        emptyState.classList.remove('show');
        document.getElementById('pipeline-table').style.display = 'table';
    }
}

// Wire filters and controls
function initControls() {
    // Search input
    document.getElementById('search').addEventListener('input', (e) => {
        currentFilters.search = e.target.value;
        renderTable();
    });

    // Priority, Fase, Esforço filter groups
    document.querySelectorAll('.filter-group').forEach(group => {
        group.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            // Toggle active class inside group
            group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filterType = btn.dataset.filter;
            const filterVal = btn.dataset.val;

            currentFilters[filterType] = filterVal;
            renderTable();
        });
    });

    // Show Done toggle button
    const btnDone = document.getElementById('reset-done');
    btnDone.addEventListener('click', () => {
        currentFilters.showDone = !currentFilters.showDone;
        if (currentFilters.showDone) {
            btnDone.innerText = '✕ OCULTAR CONCLUÍDOS';
            btnDone.style.borderColor = 'var(--neon-green)';
            btnDone.style.color = 'var(--neon-green)';
        } else {
            btnDone.innerText = '↺ MOSTRAR CONCLUÍDOS';
            btnDone.style.borderColor = 'var(--border)';
            btnDone.style.color = 'var(--text-muted)';
        }
        renderTable();
    });

    // Reset filters button
    document.getElementById('reset-filters').addEventListener('click', () => {
        currentFilters = {
            prioridade: 'all',
            fase: 'all',
            esforco: 'all',
            cluster: 'all',
            search: '',
            showDone: currentFilters.showDone
        };

        // Reset text search
        document.getElementById('search').value = '';

        // Reset visual filters
        document.querySelectorAll('.filter-group').forEach(group => {
            group.querySelectorAll('.filter-btn').forEach((b, idx) => {
                if (idx === 0) b.classList.add('active');
                else b.classList.remove('active');
            });
        });

        filterByCluster('all');
        renderTable();
    });
}

// App Boot
window.addEventListener('DOMContentLoaded', () => {
    initLegend();
    initSorting();
    initControls();
    updateStats();
    
    // Sort by priority by default
    handleSort('prioridade');
});
</script>
